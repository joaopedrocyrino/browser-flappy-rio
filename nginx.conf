server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip on the fly (Caddy ahead of us also gzips/zstds, but no harm)
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml application/manifest+json;
  gzip_min_length 256;

  # Hashed assets (Vite emits content-hashed filenames under /assets/) —
  # cache forever, mark immutable so the browser doesn't re-validate.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # PWA entry points: keep fresh so service-worker updates land within
  # one reload of a new deploy.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback (Flappy is single-page, but harmless and future-proof).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
